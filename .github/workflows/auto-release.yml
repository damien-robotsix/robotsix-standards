name: Auto Release

on:
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 09:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/auto-release.yml@54ffc3ec7cfdb1b74cd105fa5df78e68363edcbb # main
    # Authenticates as the fleet GitHub App — the installation token is
    # minted inside the reusable workflow; no PAT to rotate.
    with:
      app-id: ${{ vars.RELEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
