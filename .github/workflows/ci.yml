name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  docs:
    # Hand-rolled gate, justified: this docs-only repo has no Python package,
    # so the shared python-ci.yml (lint/type/test/coverage) does not apply.
    # This job is the PR-time strict docs build; deployment goes through the
    # self-contained build+deploy workflow in docs.yml (the shared
    # python-docs.yml reusable causes 'Deployment failed, try again later'
    # from the Pages API for this repo).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - name: Lint markdown
        run: npx --yes markdownlint-cli2 'docs/**/*.md' README.md
      - name: Spell check
        run: uv run --with codespell codespell

  changelog:
    # skip-changelog label handling lives inside the shared workflow.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/changelog-check.yml@089b2aa0ae1ee81de5069864140a49b841df44d7 # main
