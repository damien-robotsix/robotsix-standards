name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy the built site to the gh-pages branch via peaceiris/actions-gh-pages.
# This branch-based approach bypasses the Pages Actions API (actions/deploy-pages),
# which returns "Deployment failed, try again later" for this repo regardless of
# whether the workflow is self-contained or called through a reusable workflow.
# Requires the repo's Pages source to be set to "Deploy from a branch" (branch: gh-pages).
permissions:
  contents: write  # needed for peaceiris/actions-gh-pages to push to gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
