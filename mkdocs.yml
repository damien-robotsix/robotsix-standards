site_name: "Robotsix Standards"
site_url: "https://damien-robotsix.github.io/robotsix-standards/"
site_description: "Cross-cutting config and deployment standards for the robotsix stack"
repo_url: "https://github.com/damien-robotsix/robotsix-standards"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  language: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

validation:
  nav:
    not_found: warn
    omitted_files: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

hooks:
  - docs/hooks.py

plugins:
  - search
  - htmlproofer:
      raise_error_after_finish: true
      ignore_urls:
        - "http://localhost*"
        - "https://raw.githubusercontent.com/*"
        - "https://github.com/*"
        - "https://docs.github.com/*"
        - "https://owasp.org/*"
        - "https://genai.owasp.org/*"
        - "https://damien-robotsix.github.io/*"

nav:
  - Home: index.md
  - The fleet: fleet.md
  - Every repo:
      - Repo baseline: repo-baseline.md
      - Free-tier only: free-tier-only.md
      - Security posture: security-posture.md
      - Python practices: python.md
      - Pytest practices: pytest.md
      - Ruff lint rules: ruff-lint-rules.md
      - Docstring convention: docstrings.md
      - Hypothesis testing: hypothesis.md
      - Markdown linting: markdown-linting.md
      - MkDocs build integrity: mkdocs-build.md
      - JavaScript practices: javascript.md
      - Async SQLAlchemy test fixtures: async-sqlalchemy-test-fixtures.md
      - ROS 2 practices: ros2.md
  - Deployable components:
      - Component standard: component-standard.md
      - Config standard: config-standard.md
      - Default config location: default-config-location.md
      - Config ownership: config-ownership.md
      - Docker build & release: docker-standard.md
      - Deploy contract: deploy-contract.md
      - Entrypoint contract: entrypoint-contract.md
      - Integrating a service: integrating-a-service.md
      - Chat access: chat-access-standard.md
      - HTTP error envelope: http-error-envelope.md
      - HTTP security headers: http-security-headers.md
      - OpenSSF Scorecard: scorecard.md
  - Deployment system:
      - Bootstrap tier: deployment-system.md
  - Meta:
      - Mill agents: mill-agents.md
  - Changelog: CHANGELOG.md
